name: Auto Build & Deploy

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 0点 自动运行
  workflow_dispatch:  # 可以手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Prepare Web Build
        run: |
          cd web
          corepack enable
          corepack prepare pnpm@8 --activate
          pnpm install
          pnpm build
          mkdir -p ../core/web
          cp -r .output/public/* ../core/web/ 2>/dev/null || cp -r dist/* ../core/web/ 2>/dev/null || cp -r .output/* ../core/web/
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            xiaofantuan/qq-farm-bot-ui:latest
            xiaofantuan/qq-farm-bot-ui:${{ github.run_number }}